<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Proyecto Premium</title>
    <link href="css/output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>

<body class="bg-gradient-to-br from-brand-bg to-brand-soft min-h-screen flex items-center justify-center p-4">

    <!-- CONTENEDOR -->
    <div class="w-full max-w-md">

        <!-- CARD LOGIN -->
        <div class="bg-white/80 backdrop-blur-lg shadow-2xl rounded-3xl p-8 md:p-12 border border-white/20">
            <div class="text-center mb-10">
                <img src="img/logo.png" alt="Logo CECAR" class="h-20 w-auto mx-auto mb-6">
                <h1 class="text-3xl font-extrabold text-brand-dark tracking-tight">Gestión de Servicios</h1>
                <p class="text-gray-500 mt-2">Bienvenido de nuevo</p>
            </div>

            <form class="space-y-6">
                <!-- INPUTS -->
                <div>
                    <label class="block text-sm font-medium text-brand-gray mb-1">Correo Electrónico</label>
                    <input type="email" placeholder="ejemplo@correo.com" class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:border-brand-main focus:ring-2 focus:ring-brand-soft outline-none transition-all duration-200">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-brand-gray mb-1">Contraseña</label>
                    <input type="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:border-brand-main focus:ring-2 focus:ring-brand-soft outline-none transition-all duration-200">
                </div>

                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center text-brand-gray">
                        <input type="checkbox" class="mr-2 rounded border-gray-300 text-brand-main focus:ring-brand-main">
                        Recordarme
                    </label>
                    <a href="#" class="text-brand-main font-medium hover:underline text-xs">¿Olvidaste tu contraseña?</a>
                </div>

                <!-- BOTÓN -->
                <a href="dashboard.html" class="block w-full text-center bg-brand-main hover:bg-brand-hover text-white font-semibold py-4 rounded-xl shadow-lg shadow-brand-soft transition-all duration-200 transform hover:-translate-y-1 active:scale-95">
                    Ingresar
                </a>
            </form>

            <div class="mt-8 text-center text-sm text-brand-gray">
                ¿No tienes una cuenta? <a href="#" class="text-brand-main font-bold hover:underline">Regístrate</a>
            </div>
        </div>

    </div>

</body>

</html>
