<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Solicitud - Proyecto Premium</title>
    <link href="css/output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>

<body class="bg-gray-50 min-h-screen text-gray-800 pb-20">

    <!-- NAVIGATION (Breadcrumbs) -->
    <nav class="bg-white border-b border-gray-200 py-4">
        <div class="max-w-4xl mx-auto px-6 flex items-center justify-between">
            <div class="flex items-center text-sm text-brand-main">
                <a href="dashboard.html" class="hover:underline transition-colors">Dashboard</a>
                <svg class="w-4 h-4 mx-2 text-brand-gray" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <span class="text-brand-dark font-medium">Nueva Solicitud</span>
            </div>
            <img src="img/logo.png" alt="Logo CECAR" class="h-8 w-auto">
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-10">
        
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Nueva Solicitud</h1>
            <p class="text-gray-500 mt-1">Completa los campos para procesar tu requerimiento.</p>
        </div>

        <!-- FORMULARIO -->
        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
            
            <div class="p-8 space-y-8">
                <!-- SECCIÓN 1: DATOS GENERALES -->
                <div>
                    <h2 class="text-lg font-semibold text-brand-dark mb-4 flex items-center">
                        <span class="w-8 h-8 bg-brand-soft text-brand-main rounded-full flex items-center justify-center mr-3 text-sm font-bold">1</span>
                        Información General
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Nombre Completo</label>
                            <input placeholder="Ej. Juan Pérez" class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:border-brand-main focus:ring-2 focus:ring-brand-soft outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Dependencia / Departamento</label>
                            <input placeholder="Ej. Finanzas" class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none transition-all">
                        </div>
                    </div>
                </div>

                <!-- SECCIÓN 2: CLASIFICACIÓN -->
                <div>
                    <h2 class="text-lg font-semibold text-gray-800 mb-4 flex items-center">
                        <span class="w-8 h-8 bg-emerald-100 text-emerald-700 rounded-full flex items-center justify-center mr-3 text-sm">2</span>
                        Clasificación Contable
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Centro de Costos</label>
                            <select class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none transition-all appearance-none">
                                <option>Seleccionar...</option>
                                <option>Administración</option>
                                <option>Operaciones</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Rubro</label>
                            <select class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none transition-all appearance-none">
                                <option>Seleccionar...</option>
                                <option>Suministros</option>
                                <option>Servicios Técnicos</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Función</label>
                            <select class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none transition-all appearance-none">
                                <option>Seleccionar...</option>
                                <option>Soporte</option>
                                <option>Desarrollo</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- SECCIÓN 3: SERVICIOS -->
                <div>
                    <h2 class="text-lg font-semibold text-gray-800 mb-4 flex items-center">
                        <span class="w-8 h-8 bg-emerald-100 text-emerald-700 rounded-full flex items-center justify-center mr-3 text-sm">3</span>
                        Detalle de Servicios
                    </h2>
                    <div id="items" class="space-y-4 mb-4">
                        <!-- Items dinámicos aquí -->
                    </div>
                    <button onclick="agregar()" class="flex items-center text-emerald-600 font-semibold hover:text-emerald-700 transition-colors">
                        <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        Agregar servicio
                    </button>
                </div>

                <!-- SECCIÓN 4: JUSTIFICACIÓN Y ADJUNTOS -->
                <div class="grid grid-cols-1 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Justificación de la Solicitud</label>
                        <textarea rows="4" placeholder="Explica detalladamente el motivo de este requerimiento..." class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 outline-none transition-all"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Documentos Adjuntos</label>
                        <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-200 border-dashed rounded-xl hover:border-emerald-300 transition-colors cursor-pointer group">
                            <div class="space-y-1 text-center">
                                <svg class="mx-auto h-12 w-12 text-gray-400 group-hover:text-emerald-500 transition-colors" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                                    <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                                </svg>
                                <div class="flex text-sm text-gray-600">
                                    <span class="relative cursor-pointer bg-white rounded-md font-medium text-emerald-600 hover:text-emerald-500 focus-within:outline-none focus-within:ring-2 focus-within:ring-offset-2 focus-within:ring-emerald-500">Subir un archivo</span>
                                    <p class="pl-1">o arrastrar y soltar</p>
                                </div>
                                <p class="text-xs text-gray-500">PDF, PNG, JPG hasta 10MB</p>
                                <input type="file" class="sr-only">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- FOOTER ACCIONES -->
            <div class="bg-gray-50 px-8 py-6 border-t border-gray-100 flex justify-end space-x-4">
                <a href="dashboard.html" class="px-6 py-3 text-brand-gray font-semibold hover:text-brand-dark transition-colors">Cancelar</a>
                <a href="solicitudes.html" class="px-8 py-3 bg-brand-main hover:bg-brand-hover text-white font-bold rounded-xl shadow-lg shadow-brand-soft transition-all transform hover:-translate-y-0.5 active:scale-95">
                    Guardar Solicitud
                </a>
            </div>

        </div>

    </main>

    <script>
        function agregar() {
            const container = document.getElementById("items");
            const div = document.createElement("div");
            div.className = "grid grid-cols-1 md:grid-cols-4 gap-4 bg-gray-50 p-4 rounded-xl border border-gray-100 animate-fadeIn";
            div.innerHTML = `
                <div class="md:col-span-2">
                    <input placeholder="Nombre del servicio" class="w-full px-3 py-2 rounded-lg border border-gray-200 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-200 outline-none">
                </div>
                <div>
                    <input type="number" placeholder="Cantidad" class="w-full px-3 py-2 rounded-lg border border-gray-200 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-200 outline-none">
                </div>
                <div class="flex items-center justify-end">
                    <button onclick="this.parentElement.parentElement.remove()" class="text-red-400 hover:text-red-600 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </button>
                </div>
            `;
            container.appendChild(div);
        }
        
        // Agregar uno inicial
        window.onload = agregar;
    </script>

</body>

</html>
